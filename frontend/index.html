<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Portal — Log in</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-shell {
      display: flex;
      min-height: 100vh;
    }

    .brand-panel {
      flex: 1;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .brand-mark {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ochre-soft);
      z-index: 2;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 600;
      max-width: 380px;
      z-index: 2;
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 0.95rem;
      color: #B9C0D6;
      max-width: 340px;
      z-index: 2;
    }

    /* --- Signature element: timetable grid with one glowing "current period" cell --- */
    .grid-motif {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(7, 1fr);
      opacity: 0.9;
    }

    .grid-motif div {
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .grid-motif .active-period {
      background: rgba(232, 169, 60, 0.18);
      border-color: rgba(232, 169, 60, 0.35);
      animation: pulse-cell 3.5s ease-in-out infinite;
    }

    @keyframes pulse-cell {
      0%, 100% { background: rgba(232, 169, 60, 0.14); }
      50% { background: rgba(232, 169, 60, 0.30); }
    }

    @media (prefers-reduced-motion: reduce) {
      .grid-motif .active-period { animation: none; }
    }

    .form-panel {
      width: 460px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .form-panel-inner {
      width: 100%;
      max-width: 340px;
    }

    .form-panel-inner h1 {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
    }

    .form-panel-inner .eyebrow {
      margin-bottom: 0.6rem;
    }

    .form-panel-inner p.text-slate {
      font-size: 0.88rem;
      margin-bottom: 1.8rem;
    }

    .field-hint {
      font-size: 0.78rem;
      color: var(--slate);
      margin-top: 0.35rem;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 0.4rem;
    }

    @media (max-width: 820px) {
      .login-shell { flex-direction: column; }
      .brand-panel { min-height: 200px; padding: 1.75rem; }
      .brand-title { font-size: 1.6rem; }
      .form-panel { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="login-shell">
    <div class="brand-panel">
      <div class="grid-motif" id="gridMotif"></div>
      <div class="brand-mark">School Portal</div>
      <div>
        <h1 class="brand-title" id="schoolNameDisplay">Greenfield High School</h1>
        <p class="brand-sub">Timetables, attendance, results, and fees — all in one place.</p>
      </div>
      <div></div>
    </div>

    <div class="form-panel">
      <div class="form-panel-inner">
        <div class="eyebrow">Sign in</div>
        <h1>Welcome back</h1>
        <p class="text-slate">Use your ID or email to continue.</p>

        <div class="error-message" id="errorBox"></div>

        <form id="loginForm">
          <div class="field mono">
            <label for="identifier">ID or Email</label>
            <input type="text" id="identifier" name="identifier" placeholder="GHS-2026-0001 or you@school.com" required autocomplete="username" />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">Log in</button>
        </form>

        <p class="field-hint">Students &amp; teachers use their ID. Admin &amp; bursar use email.</p>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // Signature visual: randomly light up one cell in the grid as the
    // "current period" — purely decorative here, but echoes the real
    // timetable module.
    (function buildGridMotif() {
      const grid = document.getElementById('gridMotif');
      const totalCells = 6 * 7;
      const activeIndex = Math.floor(Math.random() * totalCells);
      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement('div');
        if (i === activeIndex) cell.classList.add('active-period');
        grid.appendChild(cell);
      }
    })();

    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in…';

      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || 'Something went wrong. Please try again.';
          errorBox.classList.add('visible');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log in';
          return;
        }

        // Store session info for other pages to use
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);

        const roleRoutes = {
     admin: 'admin-dashboard.html',
     teacher: 'dashboard.html',   // teacher dashboard not built yet
     student: 'student-dashboard.html',
     bursar: 'dashboard.html',    // bursar dashboard not built yet
   };
   window.location.href = roleRoutes[data.role] || 'dashboard.html';
      } catch (err) {
        errorBox.textContent = 'Could not reach the server. Please check your connection.';
        errorBox.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
