<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard — School Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .card h2 {
      font-size: 1.05rem;
      margin-bottom: 1rem;
    }
    .period-row {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--line);
      font-size: 0.9rem;
    }
    .period-row:last-child { border-bottom: none; }
    .period-time { color: var(--slate); font-family: var(--font-mono); font-size: 0.8rem; }
    .attendance-ring {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }
    .attendance-ring .big-number {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 600;
    }
    .assignment-row, .announcement-row {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--line);
    }
    .assignment-row:last-child, .announcement-row:last-child { border-bottom: none; }
    .assignment-row .due {
      font-size: 0.75rem;
      color: var(--slate);
    }
    .empty-state { color: var(--slate); font-size: 0.88rem; padding: 0.5rem 0; }
  </style>
</head>
<body>

  <div class="app-shell">
    <div class="app-sidebar">
      <h2>School Portal</h2>
      <nav>
     <a href="student-dashboard.html" class="active">Dashboard</a>
     <a href="report-card.html">Report Card</a>
     <a href="#" id="logoutLink">Log out</a>
   </nav>

    <div class="app-main">
      <div class="eyebrow" id="welcomeLabel">Student</div>
      <h1 style="margin-bottom: 1.5rem;" id="studentName">Welcome</h1>

      <div class="layout">
        <div class="card">
          <h2>Today's timetable</h2>
          <div id="timetableList"><p class="empty-state">Loading…</p></div>
        </div>

        <div class="card">
          <h2>Attendance (last 30 days)</h2>
          <div class="attendance-ring">
            <div class="big-number" id="attendanceRate">—</div>
            <div class="text-slate">present rate</div>
          </div>
          <p class="text-slate" id="attendanceDetail" style="font-size: 0.85rem;"></p>
        </div>

        <div class="card">
          <h2>Assignments</h2>
          <div id="assignmentList"><p class="empty-state">Loading…</p></div>
        </div>

       <div class="card">
         <h2>Announcements</h2>
         <div id="announcementList"><p class="empty-state">Loading…</p></div>
       </div>

      <div class="card">
         <h2>School news</h2>
         <div id="contentList"><p class="empty-state">Loading…</p></div>
       </div>

       <div class="card">
         <h2>Upcoming events</h2>
         <div id="eventList"><p class="empty-state">Loading…</p></div>
       </div>
     </div>
   </div>

  <script src="config.js"></script>
  <script src="theme.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || role !== 'student') window.location.href = 'login.html';

    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      window.location.href = 'login.html';
    });

    async function apiGet(path) {
      const res = await fetch(`${API_BASE_URL}${path}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) throw new Error('Request failed');
      return res.json();
    }

    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
   const todayName = days[new Date().getDay()];
   let myClassId = null;

   async function loadProfile() {
     try {
       const me = await apiGet('/auth/me');
       document.getElementById('studentName').textContent = `Welcome, ${me.firstName}`;
       document.getElementById('welcomeLabel').textContent = me.className ? `Student · ${me.className}` : 'Student';
       myClassId = me.classId;
     } catch (err) {
       document.getElementById('studentName').textContent = 'Welcome';
     }
   }

   async function loadTimetable() {
     try {
       if (!myClassId) { document.getElementById('timetableList').innerHTML = '<p class="empty-state">No class assigned yet.</p>'; return; }
       const entries = await apiGet(`/timetable?classId=${myClassId}`);
       const today = entries.filter(e => e.dayOfWeek === todayName).sort((a, b) => a.periodNumber - b.periodNumber);
       const container = document.getElementById('timetableList');
       if (today.length === 0) {
         container.innerHTML = `<p class="empty-state">No classes scheduled for ${todayName}.</p>`;
         return;
       }
       container.innerHTML = today.map(e => `
         <div class="period-row">
           <span>${e.subject.name}</span>
           <span class="period-time">Period ${e.periodNumber}</span>
         </div>
       `).join('');
     } catch (err) {
       document.getElementById('timetableList').innerHTML = '<p class="empty-state">Could not load timetable.</p>';
     }
   }

  async function loadAssignments() {
     try {
       if (!myClassId) { document.getElementById('assignmentList').innerHTML = '<p class="empty-state">No class assigned yet.</p>'; return; }
       const assignments = await apiGet(`/assignments?classId=${myClassId}`);
       const container = document.getElementById('assignmentList');
       if (assignments.length === 0) {
         container.innerHTML = '<p class="empty-state">No assignments right now.</p>';
         return;
       }
       container.innerHTML = assignments.slice(0, 6).map(a => `
         <div class="assignment-row" data-assignment="${a.id}">
           <div>${a.title}</div>
           <div class="due">${a.subject.name} · due ${new Date(a.dueDate).toLocaleDateString()}</div>
           <div style="margin-top:0.5rem; display:flex; gap:0.4rem;">
             <input type="text" class="submit-link-input" placeholder="Paste your submission link" style="flex:1; padding:0.4rem 0.6rem; border:1.5px solid var(--line); border-radius:7px; font-size:0.8rem;" />
             <button class="btn-secondary submit-link-btn" data-id="${a.id}" style="font-size:0.78rem; padding:0.4rem 0.7rem;">Submit</button>
           </div>
           <div class="text-slate submit-status" style="font-size:0.75rem; margin-top:0.3rem;"></div>
         </div>
       `).join('');

       container.querySelectorAll('.submit-link-btn').forEach(btn => {
         btn.addEventListener('click', async () => {
           const row = btn.closest('.assignment-row');
           const input = row.querySelector('.submit-link-input');
           const status = row.querySelector('.submit-status');
           const linkUrl = input.value.trim();
           if (!linkUrl) return;

           try {
             const res = await fetch(`${API_BASE_URL}/assignments/${btn.dataset.id}/submit`, {
               method: 'POST',
               headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
               body: JSON.stringify({ linkUrl }),
             });
             if (res.ok) {
               status.textContent = 'Submitted ✓';
               status.style.color = 'var(--success)';
             } else {
               const data = await res.json();
               status.textContent = data.error || 'Could not submit.';
             }
           } catch (err) {
             status.textContent = 'Could not reach the server.';
           }
         });
       });
     } catch (err) {
       document.getElementById('assignmentList').innerHTML = '<p class="empty-state">Could not load assignments.</p>';
     }
   }
    async function loadEvents() {
     try {
       const events = await apiGet('/events');
       const container = document.getElementById('eventList');
       if (events.length === 0) {
         container.innerHTML = '<p class="empty-state">No upcoming events.</p>';
         return;
       }
       container.innerHTML = events.slice(0, 5).map(e => `
         <div class="announcement-row">
           <div>${e.title}</div>
           <div class="due">${new Date(e.eventDate).toLocaleDateString()}${e.description ? ' · ' + e.description : ''}</div>
         </div>
       `).join('');
     } catch (err) {
       document.getElementById('eventList').innerHTML = '<p class="empty-state">Could not load events.</p>';
     }
   }
async function loadContent() {
     try {
       const posts = await apiGet('/content');
       const container = document.getElementById('contentList');
       if (posts.length === 0) {
         container.innerHTML = '<p class="empty-state">No news right now.</p>';
         return;
       }
       container.innerHTML = posts.slice(0, 5).map(p => `
         <div class="announcement-row">
           <div>${p.title}</div>
           <div class="due">${p.body}</div>
         </div>
       `).join('');
     } catch (err) {
       document.getElementById('contentList').innerHTML = '<p class="empty-state">Could not load news.</p>';
     }
   }
   async function loadAnnouncements() {
     try {
       const list = await apiGet('/announcements');
       const container = document.getElementById('announcementList');
       if (list.length === 0) {
         container.innerHTML = '<p class="empty-state">No announcements yet.</p>';
         return;
       }
       container.innerHTML = list.slice(0, 6).map(a => `
         <div class="announcement-row">
           <div>${a.title}</div>
           <div class="due">${a.body}</div>
         </div>
       `).join('');
     } catch (err) {
       document.getElementById('announcementList').innerHTML = '<p class="empty-state">Could not load announcements.</p>';
     }
   }

   async function loadAttendance() {
     try {
       const data = await apiGet('/attendance/mine');
       if (data.rate === null) {
         document.getElementById('attendanceRate').textContent = '—';
         document.getElementById('attendanceDetail').textContent = 'No attendance recorded yet.';
         return;
       }
       document.getElementById('attendanceRate').textContent = `${Math.round(data.rate * 100)}%`;
       document.getElementById('attendanceDetail').textContent = `${data.present} present, ${data.absent} absent out of ${data.total} days recorded.`;
     } catch (err) {
       document.getElementById('attendanceDetail').textContent = 'Could not load attendance.';
     }
   }

   (async function init() {
     await loadProfile();
     loadTimetable();
     loadAssignments();
     loadAnnouncements();
     loadContent();
     loadEvents();
     loadAttendance();
   })();
  </script>
</body>
</html>
